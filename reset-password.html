<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nueva contraseña | Registro de vehículos</title>
  <link rel="stylesheet" href="assets/css/styles.css">
</head>
<body class="login-page">
  <div class="page-shell login-shell">
    <main class="login-main">
      <section class="card login-card">
        <div class="login-copy">
          <h1>Nueva contraseña</h1>
          <p>Ingresa tu nueva contraseña para acceder a tu cuenta.</p>
        </div>

        <form id="resetForm" class="login-form" novalidate>
          <input type="hidden" id="resetEmail">
          
          <label>
            Nueva contraseña
            <input id="newPassword" type="password" placeholder="Mínimo 6 caracteres" required>
          </label>

          <label>
            Confirmar contraseña
            <input id="confirmPassword" type="password" placeholder="Repite tu contraseña" required>
          </label>

          <div id="resetAlert" class="form-alert" aria-live="polite"></div>

          <button class="button button-primary" type="submit">Cambiar contraseña</button>
        </form>
      </section>
    </main>
  </div>

  <script src="assets/js/auth.js"></script>
  <script src="assets/js/reset-password.js"></script>
</body>
</html>
