<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Iniciar sesion | Registro de vehiculos</title>
  <meta name="description" content="Acceso al sistema de registro de vehiculos.">
  <link rel="stylesheet" href="assets/css/styles.css">
</head>
<body class="login-page">
  <div class="page-shell login-shell">
    <div class="top-banner">
      <div class="top-banner__marquee">
        <span>Registro de vehículos</span>
        <span>Registro de vehículos</span>
      </div>
    </div>

    <main class="login-main">
      <section class="card login-card">
        <a class="brand login-brand" href="login.html">
          <span class="brand-mark">RV</span>
          <span>
            <strong>Registro de vehículos</strong>
            <small>Acceso al panel del sistema</small>
          </span>
        </a>

        <div class="login-copy">
          <h1>Iniciar sesion</h1>
          <p>Ingresa tus datos para acceder al inicio y a los modulos de registro, dashboard, vehiculos y estados.</p>
        </div>

        <form id="loginForm" class="login-form" novalidate>
          <label>
            Usuario
            <input id="username" type="text" placeholder="Tu usuario" autocomplete="username" required>
          </label>

          <label>
            Contraseña
            <input id="password" type="password" placeholder="Tu contraseña" autocomplete="current-password" required>
          </label>

          <div id="loginAlert" class="form-alert" aria-live="polite"></div>

          <button class="button button-primary" type="submit">Entrar al sistema</button>
        </form>
      </section>
    </main>
  </div>

  <script src="assets/js/auth.js"></script>
  <script src="assets/js/login.js"></script>
</body>
</html>
