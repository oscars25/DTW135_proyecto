<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Iniciar sesion | Registro de vehiculos</title>
  <meta name="description" content="Acceso al sistema de registro de vehiculos.">
  <link rel="stylesheet" href="assets/css/styles.css">
  <style>
    /* Estilos adicionales para centrar el logo y el ojito */
    .login-brand {
      justify-content: center !important;
      text-align: center;
      margin: 0 auto 1rem auto;
      display: flex !important;
    }
    .brand {
      display: inline-flex;
      align-items: center;
      gap: 0.75rem;
      text-decoration: none;
      color: #1e1e2a;
    }
    .brand-mark {
      background: #9f6b3f;
      color: white;
      width: 48px;
      height: 48px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 999px;
      font-weight: bold;
      font-size: 1.5rem;
    }
    /* Contenedor para el campo de contraseña con el botón del ojo */
    .password-wrapper {
      position: relative;
      display: flex;
      align-items: center;
    }
    .password-wrapper input {
      flex: 1;
      padding-right: 2.5rem;
    }
    .toggle-password {
      position: absolute;
      right: 0.75rem;
      background: none;
      border: none;
      cursor: pointer;
      font-size: 1.2rem;
      color: #6c757d;
      padding: 0;
    }
    .toggle-password:hover {
      color: #9f6b3f;
    }

    /* ===== FONDO CON IMAGEN DE VEHÍCULO ===== */
    .login-page {
      background-image: url('https://images.pexels.com/photos/170811/pexels-photo-170811.jpeg?auto=compress&cs=tinysrgb&w=1600');
      background-size: cover;
      background-position: center center;
      background-attachment: fixed;
      position: relative;
    }

    /* Capa oscura para mejorar contraste del texto */
    .login-page::before {
      content: '';
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-color: rgba(0, 0, 0, 0.65);
      z-index: 1;
    }

    /* Todo el contenido por encima de la capa oscura */
    .login-page .page-shell,
    .login-page .login-main,
    .login-page .top-banner {
      position: relative;
      z-index: 2;
    }

    /* Tarjeta de login ligeramente más sólida */
    .login-card {
      background: rgba(255, 255, 255, 0.96);
      backdrop-filter: blur(2px);
    }
  </style>
</head>
<body class="login-page">
  <div class="page-shell login-shell">
    <div class="top-banner">
      <div class="top-banner__marquee">
        <span>Registro de vehículos</span>
        <span>Registro de vehículos</span>
      </div>
    </div>

    <main class="login-main">
      <section class="card login-card">
        <!-- Logo centrado -->
        <div class="login-brand" style="display: flex; justify-content: center;">
          <a class="brand" href="login.html" style="justify-content: center;">
            <span class="brand-mark">RV</span>
            <span>
              <strong>Registro de vehículos</strong>
              <small>Acceso al panel del sistema</small>
            </span>
          </a>
        </div>

        <div class="login-copy">
          <h1>Iniciar sesión</h1>
          <p>Ingresa tu correo y contraseña para acceder al sistema.</p>
        </div>

        <form id="loginForm" class="login-form" novalidate>
          <label>
            Correo electrónico
            <input id="loginEmail" type="email" placeholder="correo@dominio.com" autocomplete="email" required>
          </label>

          <label>
            Contraseña
            <div class="password-wrapper">
              <input id="loginPassword" type="password" placeholder="Tu contraseña" autocomplete="current-password" required>
              <button type="button" class="toggle-password" id="togglePasswordBtn" aria-label="Mostrar contraseña">👁️</button>
            </div>
          </label>

          <div class="form-options">
            <label class="remember-me-label">
              <input type="checkbox" id="loginRemember">
              <span>Recordarme</span>
            </label>
            <a href="recover.html" class="forgot-password">¿Olvidaste tu contraseña?</a>
          </div>

          <div id="loginAlert" class="form-alert" aria-live="polite"></div>

          <button class="button button-primary" type="submit">Entrar al sistema</button>
        </form>

        <div class="login-footer">
          <p>¿No tienes cuenta? <a href="register.html">Registrarme</a></p>
        </div>
      </section>
    </main>
  </div>

  <script src="assets/js/auth.js"></script>
  <script src="assets/js/login.js"></script>
</body>
</html>
